name: release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }} -p kanata-mapping-viewer-cli

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/kanata-mapping-viewer staging/
          cp README.md staging/
          tar -czf kanata-mapping-viewer-${{ matrix.target }}.tar.gz -C staging .

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/kanata-mapping-viewer.exe" staging/
          Copy-Item README.md staging/
          Compress-Archive -Path staging/* -DestinationPath "kanata-mapping-viewer-${{ matrix.target }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: kanata-mapping-viewer-${{ matrix.target }}
          path: |
            kanata-mapping-viewer-${{ matrix.target }}.tar.gz
            kanata-mapping-viewer-${{ matrix.target }}.zip
          if-no-files-found: ignore

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: list artifacts
        run: ls -la artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
