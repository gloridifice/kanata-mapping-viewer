
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="./crates/core/assets/style.css">
        <title>kanata-viewer</title>
    </head>
    <body>
        <style>.key-bg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}.key>*:not(.key-bg){position:relative;z-index:1;}.key.passthrough .key-bg{opacity:0.35;}.key.alias .key-bg{filter:hue-rotate(140deg);}.key.unicode .key-bg{filter:hue-rotate(280deg);}.key.sexpr .key-bg{filter:hue-rotate(220deg);}</style><div class="viewer"><section class="keyboard"><h3>defsrc</h3><div class="grid" style="grid-template-columns: repeat(1, var(--key-w)); grid-template-rows: repeat(1, var(--key-h));"></div></section></div>
    </body>
